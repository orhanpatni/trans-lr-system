<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>LR Print</title>
<link rel="stylesheet" href="print.css">
</head>

<body>

<div class="copy copy1">
    <div id="copy1"></div>
</div>

<div class="copy copy2">
    <div id="copy2"></div>
</div>

<div class="copy copy3">
    <div id="copy3"></div>
</div>

<script>

const data = JSON.parse(localStorage.getItem("lrData"));

function buildCopy(id){

document.getElementById(id).innerHTML = `

<div class="lr-box">

<table class="lr-table">

<!-- ROW 1 -->
<tr>
    <td colspan="4">
        From : <b>${data.fromBranch}</b>
    </td>

    <td colspan="4">
        To : <b>${data.toBranch}</b>
    </td>

    <td colspan="2">
        Freight Type :
    </td>

    <td class="right bold">
        ${data.freightType}
    </td>
</tr>

<!-- ROW 2 -->
<tr>
    <td colspan="4">
        Date : <b>${data.bookingDate}</b>
        Time : <b>${data.bookingTime}</b>
    </td>

    <td colspan="4">
        LR No : <b>${data.lrNo}</b>
    </td>

    <td colspan="2">
        Freight
    </td>

    <td class="right">
        ${data.freight}
    </td>
</tr>

<!-- ROW 3 -->
<tr>
    <td colspan="4">
        Consignor : ${data.consignorName}
    </td>

    <td colspan="4">
        Consignee : ${data.consigneeName}
    </td>

    <td colspan="2">
        LR Charge
    </td>

    <td class="right">
        ${data.lrCharge}
    </td>
</tr>

<!-- ROW 4 -->
<tr>
    <td colspan="4">
        Mobile : ${data.consignorMobile}
    </td>

    <td colspan="4">
        Mobile : ${data.consigneeMobile}
    </td>

    <td colspan="3" rowspan="4"></td>
</tr>

<!-- ROW 5 -->
<tr>
    <td colspan="4">
        GSTN : ${data.consignorGST}
    </td>

    <td colspan="4">
        GSTN : ${data.consigneeGST}
    </td>
</tr>

<!-- HEADER -->
<tr>
    <td class="center bold">
        QTY
    </td>

    <td colspan="5" class="center bold">
        DESCRIPTION
    </td>

    <td colspan="2">
        Inv No : ${data.invoiceNo}
    </td>

</tr>

<!-- BODY -->
<tr>
    <td class="center">
        ${data.artQty}
    </td>

    <td colspan="5" class="desc-box">
        ${data.articleType}
    </td>

    <td colspan="2">
        Value : ${data.declaredValue}<br>
        Actual Wt : ${data.actualWt}<br>
        Charged Wt : ${data.chargedWt}<br>
        Delivery : ${data.deliveryAt}
    </td>


</tr>

<!-- TOTAL -->
<tr>
    <td colspan="1">
        Total : <b>${data.artQty}</b>
    </td>
    <td colspan="5" class="Right bold">
        Note : Please Do Not Make Any Payments Without Cash Receipt
    </td>
<td colspan="2" class="Right bold">
        Non Negotiable
    </td>
    <td colspan="2" class="center bold">
        TOTAL :
    </td>

    <td class="right total">
        ${data.grandTotal}
    </td>
</tr>



<!-- FOOTER -->
<tr>
    <td colspan="4">
        Private Mark : ${data.privateMark}
    </td>

    <td colspan="3">
        Remark : ${data.remarks}
    </td>

    <td colspan="4">
        Ewaybill No : ${data.ewayBill}
    </td>

    
</tr>

<tr>
    <td colspan="8" class="Right bold">
        Goods booked At Owner's risk and said to contain basis.
        Subject to Mumbai Jurisdiction. E & OE
    </td>
    

    <td colspan="3">
        Booked By : ${data.bookedBy}
    </td>
</tr>

</table>

</div>
`;
}

buildCopy("copy1");
buildCopy("copy2");
buildCopy("copy3");

window.onload = () => {
    setTimeout(() => {
        window.print();
    }, 500);
};

</script>

</body>
</html>
